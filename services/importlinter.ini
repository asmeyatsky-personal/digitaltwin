; Layer direction enforcement for the Python services (§2).
; Domain (pure models) ← application (use cases) ← infrastructure (adapters)
; ← presentation (FastAPI routers). Each service is expected to adopt this
; structure as it is refactored. Run: `lint-imports --config importlinter.ini`.

[importlinter]
root_packages =
    deepface_service
    avatar_generation_service
    voice_service
    llm_service

[importlinter:contract:deepface-layers]
name = deepface-service layer direction
type = layers
layers =
    deepface_service.presentation
    deepface_service.application
    deepface_service.domain

[importlinter:contract:avatar-layers]
name = avatar-generation-service layer direction
type = layers
layers =
    avatar_generation_service.presentation
    avatar_generation_service.application
    avatar_generation_service.domain

[importlinter:contract:voice-layers]
name = voice-service layer direction
type = layers
layers =
    voice_service.presentation
    voice_service.application
    voice_service.domain

[importlinter:contract:llm-layers]
name = llm-service layer direction
type = layers
layers =
    llm_service.presentation
    llm_service.application
    llm_service.domain
