# Template Cloud Run manifest. Substitute SERVICE and SECRET_PREFIX for each
# context when deploying. Used by deploy/cloud-run/deploy-all.sh.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: SERVICE
  annotations:
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/execution-environment: gen2
    spec:
      serviceAccountName: SERVICE-sa@PROJECT_ID.iam.gserviceaccount.com
      timeoutSeconds: 30
      containerConcurrency: 40
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/digitaltwin/SERVICE:COMMIT_SHA
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.internal:4317"
            - name: SECRET_PREFIX_LOG_LEVEL
              value: "info"
            - name: SECRET_PREFIX_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: SERVICE-database-url
                  key: latest
          startupProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 30
            failureThreshold: 3
