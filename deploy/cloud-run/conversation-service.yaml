# Cloud Run manifest for conversation-service.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: conversation-service
  annotations:
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "20"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/execution-environment: gen2
    spec:
      serviceAccountName: conversation-service-sa@PROJECT_ID.iam.gserviceaccount.com
      timeoutSeconds: 60
      containerConcurrency: 40
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/digitaltwin/conversation-service:COMMIT_SHA
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
          env:
            - name: CONVERSATION_LOG_LEVEL
              value: "info"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.internal:4317"
            - name: CONVERSATION_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: conversation-database-url
                  key: latest
            - name: CONVERSATION_ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-api-key
                  key: latest
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
