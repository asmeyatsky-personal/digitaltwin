# Cloud Build pipeline for backend services. Triggered on push to main.
# Substitutions: _COMMIT_SHA, _REGION.

steps:
  - name: gcr.io/cloud-builders/docker
    id: build-identity
    args:
      - build
      - --file=backend/services/identity-service/Dockerfile
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/digitaltwin/identity-service:${_COMMIT_SHA}
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/digitaltwin/identity-service:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-identity
    args: [push, --all-tags, "${_REGION}-docker.pkg.dev/${PROJECT_ID}/digitaltwin/identity-service"]

  # SBOM generation (§4 supply chain).
  - name: anchore/syft:latest
    id: sbom-identity
    args:
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/digitaltwin/identity-service:${_COMMIT_SHA}"
      - -o
      - spdx-json=/workspace/identity-sbom.spdx.json

artifacts:
  objects:
    location: "gs://${PROJECT_ID}-build-artifacts/${_COMMIT_SHA}/"
    paths:
      - identity-sbom.spdx.json

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
