# cargo-deny: supply chain enforcement (¬ß4). Run in CI: `cargo deny check`.
#
# Layer direction (¬ß2) is enforced mechanically by each crate's `Cargo.toml`
# dependency list ‚Äî a domain crate that only declares `thiserror` + `serde` +
# `chrono` + `async-trait` cannot transitively pull in `tokio` or `sqlx`, and
# the compiler rejects any attempt to `use` them. A parallel `bans.deny`
# list here would duplicate that check with a trickier wrapper allowlist that
# grows with every new bounded context, so we rely on Cargo.toml discipline.
# If a real violation appears, `cargo tree -p <crate>-domain` will catch it.

[graph]
all-features = false
no-default-features = false

[advisories]
version = 2
yanked = "deny"
ignore = [
    # tokio-tar is pulled only by `testcontainers` (dev-only via
    # identity-integration-tests). No production binary includes it.
    { id = "RUSTSEC-2025-0111", reason = "dev-only via testcontainers; not in production binaries" },
    # rsa 0.9 Marvin Attack. `rsa` is used only by the Identity E2E test to
    # generate an ephemeral keypair; production JWT signing uses jsonwebtoken.
    { id = "RUSTSEC-2023-0071", reason = "dev-only RSA keygen in integration tests" },
    # rustls-pemfile unmaintained. Indirect dep via bollard ‚Üí testcontainers
    # (dev-only); no safe upgrade path, not reachable from production code.
    { id = "RUSTSEC-2025-0134", reason = "unmaintained, dev-only via testcontainers" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    # webpki-roots ships the Mozilla trust bundle under CDLA-Permissive-2.0.
    # Permissive, no copyleft; only used for rustls TLS verification.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

# Workspace crates are private (not published to crates.io); cargo-deny skips
# the license check for them so the intentionally non-SPDX `license =
# "Proprietary"` in workspace.package does not fail CI.
private = { ignore = true }

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[bans]
multiple-versions = "warn"
# Path deps in the workspace are intentionally unversioned.
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
