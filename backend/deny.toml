# cargo-deny: supply chain (§4) + layer direction enforcement (§2).
# Run in CI: `cargo deny check`

[graph]
all-features = false
no-default-features = false

[advisories]
version = 2
yanked = "deny"
ignore = [
    # tokio-tar is pulled only by `testcontainers` (dev-only, gated behind
    # [dev-dependencies] of identity-integration-tests). The advisory describes
    # a tar-parsing bug that never touches production code paths. No safe
    # upgrade exists; upstream testcontainers has not migrated yet.
    { id = "RUSTSEC-2025-0111", reason = "dev-only via testcontainers; not in production binaries" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
]
confidence-threshold = 0.93

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# -------- Layer boundary enforcement (§2 domain ← application ← infrastructure ← presentation) --------
# cargo-deny's `bans` table forbids specific crates from appearing in a dependency subtree.
# We assert that each domain crate's transitive deps contain no infrastructure/presentation crate.
# If a future refactor accidentally introduces such a dep, `cargo deny check bans` fails CI.

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Domain must not depend on any adapter/runtime/framework crate.
deny = [
    # tokio/axum/sqlx/etc. are adapter concerns — domain must stay pure.
    # These rules apply only when the crate appears under a domain crate's subtree,
    # expressed via `wrappers` (the parent that is allowed to pull the dep in).
    { crate = "tokio",   wrappers = ["audit", "telemetry", "identity-application", "identity-infrastructure", "identity-presentation", "identity-service"] },
    { crate = "axum",    wrappers = ["identity-presentation", "identity-service"] },
    { crate = "tonic",   wrappers = ["identity-presentation", "identity-service"] },
    { crate = "sqlx",    wrappers = ["audit", "identity-infrastructure"] },
    { crate = "reqwest", wrappers = ["identity-infrastructure", "telemetry"] },
    { crate = "argon2",  wrappers = ["identity-infrastructure"] },
    { crate = "jsonwebtoken", wrappers = ["identity-infrastructure"] },
]
