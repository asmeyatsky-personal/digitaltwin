syntax = "proto3";

package digitaltwin.voice.v1;

service VoiceService {
  rpc RegisterVoice(RegisterVoiceRequest) returns (RegisterVoiceResponse);
  rpc Synthesize(SynthesizeRequest) returns (SynthesizeResponse);
  rpc GetJob(GetJobRequest) returns (GetJobResponse);
}

message RegisterVoiceRequest { string user_id = 1; string sample_url = 2; }
message RegisterVoiceResponse {}
message SynthesizeRequest { string user_id = 1; string text = 2; string emotion = 3; }
message SynthesizeResponse { string job_id = 1; string audio_url = 2; }
message GetJobRequest { string job_id = 1; }
message GetJobResponse { string status = 1; string audio_url = 2; string text = 3; string emotion = 4; }
