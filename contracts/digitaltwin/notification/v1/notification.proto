syntax = "proto3";

package digitaltwin.notification.v1;

service NotificationService {
  rpc RegisterDevice(RegisterDeviceRequest) returns (RegisterDeviceResponse);
  rpc UnregisterDevice(UnregisterDeviceRequest) returns (UnregisterDeviceResponse);
  rpc SendPush(SendPushRequest) returns (SendPushResponse);
}

message RegisterDeviceRequest { string user_id = 1; string token = 2; string platform = 3; }
message RegisterDeviceResponse {}
message UnregisterDeviceRequest { string token = 1; }
message UnregisterDeviceResponse {}
message SendPushRequest { string user_id = 1; string title = 2; string body = 3; string data_json = 4; }
message SendPushResponse { uint32 delivered = 1; }
