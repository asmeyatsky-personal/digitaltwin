syntax = "proto3";

package digitaltwin.learning.v1;

// Skeleton contract for the learning bounded context. Concrete RPCs land
// during the legacy .NET port; this file exists so the context's Rust
// contracts crate has something to compile.

service LearningService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
}
