syntax = "proto3";

package digitaltwin.conversation.v1;

// Skeleton contract for the conversation bounded context. Concrete RPCs land
// during the legacy .NET port; this file exists so the context's Rust
// contracts crate has something to compile.

service ConversationService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
}
