name: backend

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'contracts/**'
      - '.github/workflows/backend.yml'
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt-clippy-test:
    name: fmt + clippy + test
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --locked

  # §2 layer direction enforced via cargo-deny `bans` rules in backend/deny.toml.
  # §4 supply chain: advisories + licenses + sources.
  deny:
    name: cargo-deny (layer boundaries + supply chain)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: backend/Cargo.toml
          command: check
          arguments: --all-features

  audit:
    name: cargo-audit
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # §5 testing floor. Overall ≥80%; per-crate thresholds enforced by the
  # check-coverage.py script below.
  coverage:
    name: coverage gate
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - run: cargo llvm-cov --workspace --json --output-path coverage.json --locked
      - run: python3 ../scripts/check-coverage.py coverage.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage.json
          path: backend/coverage.json

  # §4 SBOM at build time.
  sbom:
    name: SBOM
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          path: ./backend
          format: spdx-json
          artifact-name: backend-sbom.spdx.json
